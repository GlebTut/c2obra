name: Branch Coverage Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── Job 1: Install dependencies ──────────────────────────────────────────
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Cache venv
        uses: actions/cache@v5
        with:
          path: venv
          key: venv-${{ hashFiles('requirements.txt') }}

  # ─── Job 2: Run pipeline on example benchmarks ────────────────────────────
  pipeline:
    runs-on: ubuntu-latest
    needs: install

    strategy:
      matrix:
        file:
          - tests/examples/simple_if.c
          - tests/loop-simple/nested_1.c
          - tests/demo_test_files/

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Restore venv
        uses: actions/cache@v5
        with:
          path: venv
          key: venv-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies (cache miss fallback)
        run: |
          if [ ! -f venv/bin/activate ]; then
            python -m venv venv
          fi
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Install system dependencies + Sikraken
        run: |
          chmod +x install.sh
          bash install.sh

      - name: Run pipeline
        env:
          SIKRAKEN_DIR: /home/runner/sikraken    # ← tell pipeline where it is
        run: |
          source venv/bin/activate
          chmod +x run_pipeline.sh
          ./run_pipeline.sh ${{ matrix.file }} --cpu 30 --memory 512

      - name: Upload coverage artefacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: coverage-${{ strategy.job-index }}
          path: output/
          retention-days: 7

  # ─── Job 3: Verify + build GitHub Pages ───────────────────────────────────
  verify:
    runs-on: ubuntu-latest
    needs: pipeline

    steps:
      - uses: actions/checkout@v5

      - name: Download all artefacts
        uses: actions/download-artifact@v4.3.0
        with:
          path: artifacts/

      - name: Flatten all reports into one folder
        run: |
          mkdir -p pages
          find artifacts/ -type f \( -name "*.html" -o -name "*.json" -o -name "*.csv" \) \
            -exec cp {} pages/ \;
          echo "=== Pages folder contents ==="
          ls pages/

      - name: Create index.html for GitHub Pages
        run: |
          cd pages
          if [ -f "summary_report.html" ]; then
            cp summary_report.html index.html
          else
            echo '<!DOCTYPE html><html><head><meta charset="UTF-8">
            <title>Coverage Reports</title>
            <style>
              body { font-family: sans-serif; padding: 2em; background: #0f172a; color: #f1f5f9; }
              a { color: #60a5fa; }
              li { margin: 0.5em 0; }
            </style></head>
            <body><h1>Coverage Reports</h1><ul>' > index.html
            for f in *_report.html; do
              echo "<li><a href=\"$f\">$f</a></li>" >> index.html
            done
            echo '</ul></body></html>' >> index.html
          fi

      - name: Check coverage reports exist
        run: |
          echo "=== Coverage percentages ==="
          for f in $(find artifacts/ -name "*_coverage.json"); do
            pct=$(python3 -c "
          import json
          d = json.load(open('$f'))
          print(d['summary']['branch_coverage_pct'])
          " 2>/dev/null || echo "N/A")
            echo "$f → $pct%"
          done

      - name: Fail if no coverage reports generated
        run: |
          count=$(find pages/ -name "*_report.html" | wc -l)
          echo "Found $count HTML report(s)"
          if [ "$count" -eq 0 ]; then
            echo "❌ No coverage reports generated"
            exit 1
          fi
          echo "✅ All reports generated successfully"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages/

  # ─── Job 4: Deploy to GitHub Pages ────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4